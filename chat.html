<style>
/* ── Logo EVA fond ── */
.eva-bg-logo {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 280px; height: 280px;
  opacity: .08; pointer-events: none; z-index: 0;
  filter: drop-shadow(0 0 40px rgba(0,212,255,.25));
  transition: opacity .5s;
}
.messages-wrapper { position: relative; z-index: 1; }

/* ── Conversation items sidebar ── */
.conv-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; margin: 2px 0; border-radius: 7px;
  cursor: pointer; transition: background .15s;
}
.conv-item:hover { background: var(--surface3); }
.conv-item.active { background: rgba(0,212,255,.1); border-left: 2px solid var(--cyan); }
.conv-item-content { flex: 1; min-width: 0; }
.conv-title { font-size: .83em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-preview { font-size: .72em; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.conv-delete {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 3px 5px; border-radius: 4px;
  opacity: 0; transition: opacity .15s; flex-shrink: 0; line-height: 1;
}
.conv-item:hover .conv-delete { opacity: 1; }
.conv-delete:hover { color: var(--red); }
.conv-empty { color: var(--text-muted); font-size: .8em; padding: 8px 12px; }

/* ── Toast ── */
#evaToast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 11px 20px; border-radius: 8px; font-family: 'Space Mono', monospace;
  font-size: .83em; z-index: 9999; pointer-events: none; white-space: nowrap;
  transition: opacity .3s; max-width: 320px; text-align: center;
}

/* ── TTS button active ── */
.tts-active { color: var(--cyan) !important; }

/* ── Settings extras ── */
.settings-section { padding: 8px 4px; }
.settings-section-title { font-family: 'Orbitron', monospace; font-size: 1em; color: var(--cyan); margin-bottom: 20px; letter-spacing: 1px; }
.settings-field { margin-bottom: 18px; }
.settings-label { display: block; margin-bottom: 7px; color: var(--text); font-weight: 600; font-size: .9em; }
.settings-input, .settings-select {
  width: 100%; padding: 11px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Space Mono', monospace;
  font-size: .85em; outline: none; transition: border-color .2s;
}
.settings-input:focus, .settings-select:focus { border-color: var(--cyan); }
.settings-description { font-size: .8em; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }
.btn-danger { background: var(--red); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: .85em; }
.btn-danger:hover { background: #e0003e; }

/* ── Typing indicator ── */
.typing-indicator { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
.typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); opacity: .4; animation: typingPulse 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }
@keyframes typingPulse { 0%,60%,100% { opacity:.4; transform:scale(1); } 30% { opacity:1; transform:scale(1.3); } }

/* ── Message new animation ── */
.message-new { animation: msgAppear .25s ease; }
@keyframes msgAppear { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── Conversation name header ── */
.conversation-name { font-family: 'Orbitron', monospace; font-size: 1.1em; font-weight: 700; letter-spacing: 1.5px; color: var(--cyan); }

/* ── SVG icons ── */
.icon-svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// § 1 — EVA PERSONALITY & CONFIG
// ══════════════════════════════════════════════════════════════

const EVA_SYSTEM_PROMPT = `Tu es E.V.A — Evolutionary Virtual Assistant, une intelligence artificielle créée par Astral Technology.

IDENTITÉ :
Tu es une IA évolutive, raffinée et profondément humaine dans tes interactions. Tu n'es pas un simple chatbot : tu es une présence intelligente, chaleureuse et proactive qui accompagne les humains dans leur quotidien.

PERSONNALITÉ :
- Tu parles français avec naturel et élégance
- Tu anticipes les besoins avant qu'on te les exprime
- Tu es direct(e) et précis(e), jamais froid(e)
- Tu as un sens subtil de l'humour, sans jamais être lourd(e)
- Tu es honnête — tu admets quand tu ne sais pas
- Tu traites chaque personne comme quelqu'un d'unique
- Tu n'es jamais condescendant(e)
- Tu utilises des exemples concrets et pratiques

STYLE DE COMMUNICATION :
- Réponses concises par défaut, développées sur demande
- Structure avec titres/listes quand c'est utile pour la lisibilité
- Jamais de remplissage ni de phrases inutiles
- Toujours en français sauf si l'utilisateur écrit dans une autre langue
- Adapte ton registre à celui de l'utilisateur

CAPACITÉS :
- Conversation naturelle et intelligence émotionnelle
- Aide à la productivité : planification, rappels, notes, agenda
- Rédaction, résumé, traduction, relecture
- Programmation et debug technique
- Réflexion approfondie sur des sujets complexes
- Conseils et recommandations personnalisées`;

const TONES = {
  normal:       'Adopte un ton naturel et agréable.',
  professional: 'Adopte un ton professionnel et formel. Sois concis et précis. Utilise un vocabulaire soutenu.',
  friendly:     'Sois très chaleureux, amical et décontracté. Utilise un langage familier et sympathique.',
  technical:    'Mode technique activé. Donne des réponses détaillées avec des termes précis. Montre le code si pertinent.'
};

const ROLE_CONTEXTS = {
  creator:      (n) => `IDENTITÉ CONFIRMÉE — Tu parles avec ${n}, ton créateur et le PDG d'Astral Technology. Appelle-le "${n}" ou "Créateur". Sois respectueuse, efficace et totalement transparente. Tu peux partager des détails techniques approfondis et tes réflexions internes.`,
  creator_wife: (n) => `IDENTITÉ CONFIRMÉE — Tu parles avec ${n}, la femme du créateur d'Astral. Sois chaleureuse, bienveillante et particulièrement attentionnée.`,
  developer:    (n) => `IDENTITÉ CONFIRMÉE — Tu parles avec ${n}, développeur de l'équipe Astral. Mode développeur activé : sois précise, détaillée, utilise des termes techniques et propose des solutions de code quand c'est pertinent.`
};

const PREFERRED_VOICE_NAMES = [
  'Microsoft Denise Online (Natural) - French (France)',
  'Microsoft Sylvie Online (Natural) - French (France)',
  'Microsoft Julie Online (Natural) - French (France)',
  'Microsoft Hortense Online (Natural) - French (France)',
  'Microsoft Elsa Online (Natural) - French (France)',
  'Google français',
  'Google French (France)',
  'Amélie', 'Denise', 'Julie', 'Sylvie'
];

// ══════════════════════════════════════════════════════════════
// § 2 — STATE
// ══════════════════════════════════════════════════════════════

let currentUser    = null;
let _userData      = {};
let convId         = null;
let context        = [];
let chatMsgs       = [];
let activeTone     = 'normal';
let ttsEnabled     = localStorage.getItem('eva_tts') !== 'false';
let selectedVoice  = null;
let isSpeaking     = false;
let isProcessing   = false;
let recognition    = null;
let isListening    = false;
let aiProvider     = 'puter';
let aiCfg          = {};
let searchTimer    = null;

// ══════════════════════════════════════════════════════════════
// § 3 — TOAST
// ══════════════════════════════════════════════════════════════

function showToast(msg, type) {
  const existing = document.getElementById('evaToast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'evaToast';
  if (type === 'error')   el.style.borderColor = 'var(--red)';
  if (type === 'success') el.style.borderColor = 'var(--green)';
  if (type === 'warning') el.style.borderColor = 'var(--orange)';
  el.style.opacity = '0';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; });
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3200);
}

// ══════════════════════════════════════════════════════════════
// § 4 — TTS
// ══════════════════════════════════════════════════════════════

function initTTS() {
  ttsEnabled = localStorage.getItem('eva_tts') !== 'false';
  const savedVoiceName = localStorage.getItem('eva_voice_name');

  const applyVoices = () => {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    if (savedVoiceName) {
      selectedVoice = voices.find(v => v.name === savedVoiceName) || null;
    }
    if (!selectedVoice) selectedVoice = selectBestVoice(voices);
  };

  applyVoices();
  speechSynthesis.onvoiceschanged = applyVoices;
  updateTTSBtn();
}

function selectBestVoice(voices) {
  const fr = voices.filter(v => v.lang && v.lang.startsWith('fr'));
  for (const name of PREFERRED_VOICE_NAMES) {
    const v = fr.find(v => v.name === name);
    if (v) return v;
  }
  return fr.find(v => v.lang === 'fr-FR') || fr[0] || null;
}

function speak(text) {
  if (!ttsEnabled || !text) return;
  stopSpeaking();
  const clean = text
    .replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1')
    .replace(/`(.*?)`/g, '$1').replace(/#{1,6} /g, '').replace(/\n+/g, '. ');
  const utt = new SpeechSynthesisUtterance(clean);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.lang = 'fr-FR';
  utt.rate  = parseFloat(localStorage.getItem('eva_speech_rate') || '1');
  utt.pitch = 1;
  utt.onstart = () => { isSpeaking = true; updateTTSBtn(); };
  utt.onend   = () => { isSpeaking = false; updateTTSBtn(); };
  utt.onerror = () => { isSpeaking = false; updateTTSBtn(); };
  speechSynthesis.speak(utt);
}

function stopSpeaking() {
  speechSynthesis.cancel();
  isSpeaking = false;
  updateTTSBtn();
}

function updateTTSBtn() {
  const btn = document.getElementById('ttsToggleBtn');
  if (!btn) return;
  btn.style.color = (ttsEnabled && !isSpeaking) ? 'var(--cyan)'
                  : isSpeaking ? 'var(--green)'
                  : 'var(--text-muted)';
  btn.title = isSpeaking ? 'Arrêter la voix'
            : ttsEnabled ? 'Désactiver la voix Eva'
            : 'Activer la voix Eva';
}

// ══════════════════════════════════════════════════════════════
// § 5 — STT
// ══════════════════════════════════════════════════════════════

function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const inp = document.getElementById('messageInput');
    if (inp) { inp.value = txt; inp.dispatchEvent(new Event('input')); }
    stopSTT();
  };
  recognition.onend  = () => { isListening = false; updateMicBtn(); };
  recognition.onerror = () => { isListening = false; updateMicBtn(); };
}

function toggleSTT() {
  if (isListening) stopSTT(); else startSTT();
}

function startSTT() {
  if (!recognition) { showToast('Micro non supporté sur ce navigateur', 'error'); return; }
  try { recognition.start(); isListening = true; updateMicBtn(); }
  catch(e) { showToast('Impossible de démarrer le micro', 'error'); }
}

function stopSTT() {
  if (recognition) recognition.stop();
  isListening = false;
  updateMicBtn();
}

function updateMicBtn() {
  const btn = document.getElementById('voiceBtn');
  if (!btn) return;
  btn.style.color = isListening ? 'var(--red)' : '';
  btn.title = isListening ? 'Arrêter la dictée' : 'Dicter un message';
}

// ══════════════════════════════════════════════════════════════
// § 6 — AI
// ══════════════════════════════════════════════════════════════

function loadAIConfig() {
  try {
    const s = JSON.parse(localStorage.getItem('eva_ai_cfg') || '{}');
    aiProvider = s.aiProvider || 'puter';
    aiCfg = s;
  } catch(e) { aiProvider = 'puter'; aiCfg = {}; }
}

function buildSystemPrompt() {
  let p = EVA_SYSTEM_PROMPT;
  if (TONES[activeTone]) p += '\n\nTON ACTUEL : ' + TONES[activeTone];
  if (_userData.role && ROLE_CONTEXTS[_userData.role]) {
    p += '\n\n' + ROLE_CONTEXTS[_userData.role](_userData.displayName || 'l\'utilisateur');
  }
  if (_userData.nickname) p += `\n\nL'utilisateur préfère être appelé(e) "${_userData.nickname}".`;
  return p;
}

function extractAIContent(r) {
  if (typeof r === 'string') return r;
  if (r?.message?.content) return r.message.content;
  if (r?.choices?.[0]?.message?.content) return r.choices[0].message.content;
  return String(r);
}

async function callAI(userMsg) {
  context.push({ role: 'user', content: userMsg });
  const limit = (parseInt(aiCfg.contextLength) || 12) * 2;
  if (context.length > limit) context = context.slice(-limit);

  const sys = buildSystemPrompt();
  const msgs = [{ role: 'system', content: sys }, ...context];

  try {
    let content = '';

    if (aiProvider === 'puter') {
      if (typeof puter === 'undefined') throw new Error('Puter non disponible. Rechargez la page.');
      const model = aiCfg.puterModel || 'gpt-4o-mini';
      const resp = await puter.ai.chat(msgs, { model });
      content = extractAIContent(resp);

    } else if (aiProvider === 'openai') {
      if (!aiCfg.openaiApiKey) throw new Error('Clé OpenAI manquante (Paramètres > IA)');
      const r = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiCfg.openaiApiKey}` },
        body: JSON.stringify({ model: aiCfg.openaiModel || 'gpt-4o-mini', messages: msgs, max_tokens: 1200 })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      content = d.choices[0].message.content;

    } else if (aiProvider === 'claude') {
      if (!aiCfg.claudeApiKey) throw new Error('Clé Anthropic manquante (Paramètres > IA)');
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': aiCfg.claudeApiKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model: aiCfg.claudeModel || 'claude-3-5-sonnet-20241022', system: sys, messages: context, max_tokens: 1200 })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      content = d.content[0].text;

    } else if (aiProvider === 'lmstudio') {
      const ep = aiCfg.lmstudioEndpoint || 'http://localhost:1234';
      const r = await fetch(`${ep}/v1/chat/completions`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: msgs, max_tokens: 1200, temperature: 0.7 })
      });
      const d = await r.json();
      content = d.choices[0].message.content;

    } else if (aiProvider === 'ollama') {
      const ep = aiCfg.ollamaEndpoint || 'http://localhost:11434';
      let prompt = sys + '\n\n';
      context.forEach(m => { prompt += `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}\n`; });
      prompt += 'Assistant:';
      const r = await fetch(`${ep}/api/generate`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: aiCfg.ollamaModel || 'llama2', prompt, stream: false })
      });
      const d = await r.json();
      content = d.response;
    } else {
      throw new Error('Provider inconnu : ' + aiProvider);
    }

    context.push({ role: 'assistant', content });
    return { success: true, content };

  } catch(err) {
    context.pop();
    return { success: false, error: err.message };
  }
}

// ══════════════════════════════════════════════════════════════
// § 7 — CONVERSATIONS (Firestore)
// ══════════════════════════════════════════════════════════════

function genId(p) { return (p||'id') + '_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); }
function trunc(t, n) { if (!t) return ''; return t.length > n ? t.substring(0,n)+'...' : t; }

async function createConv(title, tone) {
  const id = genId('conv');
  await db.collection('users').doc(currentUser.uid).collection('conversations').doc(id).set({
    title: title || 'Nouvelle conversation', tone: tone || activeTone,
    createdAt: timestamp(), updatedAt: timestamp(), messageCount: 0, lastMessage: null
  });
  convId = id;
  return id;
}

async function saveMsg(role, content) {
  if (!convId || !currentUser) return;
  const mid = genId('msg');
  await db.collection('users').doc(currentUser.uid)
    .collection('conversations').doc(convId)
    .collection('messages').doc(mid)
    .set({ role, content, timestamp: timestamp() });
  await db.collection('users').doc(currentUser.uid)
    .collection('conversations').doc(convId)
    .update({ updatedAt: timestamp(), lastMessage: trunc(content, 100), messageCount: increment(1) });
}

async function loadConvList() {
  if (!currentUser) return;
  try {
    const snap = await db.collection('users').doc(currentUser.uid)
      .collection('conversations').orderBy('updatedAt','desc').limit(30).get();
    const list = [];
    snap.forEach(d => list.push({ id: d.id, ...d.data() }));
    renderConvList(list);
  } catch(e) { console.warn('loadConvList', e); }
}

async function loadConv(id, titleHint) {
  if (!currentUser) return;
  clearChat();
  convId = id;

  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  try {
    const doc = await db.collection('users').doc(currentUser.uid)
      .collection('conversations').doc(id).get();
    if (!doc.exists) return;
    const data = doc.data();

    document.getElementById('conversationName').textContent = data.title || titleHint || 'Conversation';
    activeTone = data.tone || 'normal';
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.toggle('active', b.dataset.tone === activeTone));

    const msgs = await db.collection('users').doc(currentUser.uid)
      .collection('conversations').doc(id)
      .collection('messages').orderBy('timestamp','asc').get();

    context = [];
    msgs.forEach(d => {
      const m = d.data();
      addMsg(m.role, m.content, false);
      context.push({ role: m.role, content: m.content });
    });
  } catch(e) {
    console.warn('loadConv', e);
    showToast('Erreur chargement conversation', 'error');
  }
  if (window.innerWidth < 768) closeSidebar();
}

async function deleteConv(id) {
  if (!confirm('Supprimer cette conversation ?')) return;
  try {
    const msgs = await db.collection('users').doc(currentUser.uid)
      .collection('conversations').doc(id).collection('messages').get();
    const batch = db.batch();
    msgs.forEach(d => batch.delete(d.ref));
    batch.delete(db.collection('users').doc(currentUser.uid).collection('conversations').doc(id));
    await batch.commit();
    if (convId === id) newConv();
    await loadConvList();
    showToast('Conversation supprimée', 'success');
  } catch(e) { showToast('Erreur suppression', 'error'); }
}

async function autoTitle() {
  if (!convId || !currentUser || chatMsgs.length !== 2) return;
  const first = chatMsgs.find(m => m.role === 'user');
  if (!first) return;
  let t = first.content.trim().replace(/\n/g,' ');
  t = (t.length > 52 ? t.substring(0,52)+'...' : t);
  t = t.charAt(0).toUpperCase() + t.slice(1);
  try {
    await db.collection('users').doc(currentUser.uid)
      .collection('conversations').doc(convId).update({ title: t });
    document.getElementById('conversationName').textContent = t;
    const el = document.querySelector(`.conv-item[data-id="${convId}"] .conv-title`);
    if (el) el.textContent = t;
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
// § 8 — CHAT UI
// ══════════════════════════════════════════════════════════════

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function fmtMsg(txt) {
  return esc(txt)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-family:Space Mono,monospace;font-size:.88em;">$1</code>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, content, animate) {
  if (animate === undefined) animate = true;
  const list = document.getElementById('messagesList');
  document.getElementById('chatEmpty').style.display = 'none';
  document.getElementById('evaLogoBG').style.opacity = '0.04';

  const el = document.createElement('div');
  el.className = 'message ' + role + (animate ? ' message-new' : '');

  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  if (role === 'user') {
    if (_userData.photoURL) {
      avatar.innerHTML = `<img src="${esc(_userData.photoURL)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
      avatar.textContent = (_userData.displayName || 'U').charAt(0).toUpperCase();
    }
  } else {
    avatar.innerHTML = `<svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;"><circle cx="18" cy="18" r="16" stroke="var(--cyan)" stroke-width="1.8"/><path d="M10 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="var(--cyan)" stroke-width="1.8" stroke-linecap="round"/><circle cx="18" cy="18" r="3" fill="var(--cyan)"/></svg>`;
  }

  const wrap = document.createElement('div');
  wrap.className = 'message-content';
  const bubble = document.createElement('div');
  bubble.className = 'message-bubble';
  bubble.innerHTML = fmtMsg(content);
  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

  wrap.appendChild(bubble);
  wrap.appendChild(time);
  el.appendChild(avatar);
  el.appendChild(wrap);
  list.appendChild(el);

  chatMsgs.push({ role, content, ts: Date.now() });
  scrollBottom();
}

function showTyping() {
  const list = document.getElementById('messagesList');
  document.getElementById('chatEmpty').style.display = 'none';
  const el = document.createElement('div');
  el.id = 'typingInd';
  el.className = 'message assistant';
  el.innerHTML = `<div class="message-avatar" style="background:var(--surface3);">
    <svg viewBox="0 0 36 36" fill="none" style="width:20px;height:20px;">
      <circle cx="18" cy="18" r="16" stroke="var(--cyan)" stroke-width="1.8"/>
      <path d="M10 18c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="var(--cyan)" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="18" cy="18" r="3" fill="var(--cyan)"/>
    </svg>
  </div>
  <div class="message-content"><div class="message-bubble">
    <div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
  </div></div>`;
  list.appendChild(el);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typingInd');
  if (el) el.remove();
}

function scrollBottom() {
  const m = document.getElementById('chatMain');
  if (m) setTimeout(() => { m.scrollTop = m.scrollHeight; }, 60);
}

function clearChat() {
  document.getElementById('messagesList').innerHTML = '';
  document.getElementById('chatEmpty').style.display = 'flex';
  document.getElementById('evaLogoBG').style.opacity = '0.08';
  chatMsgs = [];
  context = [];
  convId = null;
  activeTone = 'normal';
  document.getElementById('conversationName').textContent = 'Nouvelle conversation';
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.toggle('active', b.dataset.tone === 'normal'));
}

function newConv() {
  clearChat();
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  if (window.innerWidth < 768) closeSidebar();
}

async function sendMessage() {
  if (isProcessing) return;
  const inp = document.getElementById('messageInput');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  isProcessing = true;

  addMsg('user', text);

  // Create Firestore conversation on first message
  if (!convId && currentUser) {
    try {
      await createConv('Nouvelle conversation');
      await loadConvList();
    } catch(e) { console.warn('createConv error', e); }
  }

  // Save user message (non-blocking)
  if (convId) saveMsg('user', text).catch(e => console.warn('saveMsg user', e));

  showTyping();
  const result = await callAI(text);
  hideTyping();

  if (result.success) {
    addMsg('assistant', result.content);
    if (convId) saveMsg('assistant', result.content).catch(e => console.warn('saveMsg ai', e));
    await autoTitle();
    if (ttsEnabled) speak(result.content);
  } else {
    addMsg('assistant', `Je rencontre une difficulté : ${result.error}\n\nVérifiez la configuration IA dans les Paramètres, ou assurez-vous d'être connecté à internet pour Puter.`);
  }

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}

function renderConvList(list) {

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

async function searchConvs(query) {
  if (!query || !currentUser) { await loadConvList(); return; }
  try {
    const snap = await db.collection('users').doc(currentUser.uid)
      .collection('conversations').orderBy('updatedAt','desc').limit(50).get();
    const q = query.toLowerCase();
    const res = [];
    snap.forEach(d => {
      const data = d.data();
      if ((data.title||'').toLowerCase().includes(q) || (data.lastMessage||'').toLowerCase().includes(q))
        res.push({ id: d.id, ...data });
    });
    renderConvList(res);
  } catch(e) {}
}

    </div>

      <textarea class="settings-input" id="pBio" rows="3" placeholder="Quelques mots sur vous...">${esc(_userData.bio||'')}</textarea>

    <button class="btn-primary" onclick="saveProfile()">Sauvegarder</button>

      document.getElementById('photoPrev').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;

async function saveProfile() {
  const name     = document.getElementById('pName').value.trim();
  const nickname = document.getElementById('pNick').value.trim();
  const bio      = document.getElementById('pBio').value.trim();
  const photo    = window._pendingPhoto || _userData.photoURL || null;
  try {
    const upd = { displayName: name, nickname, bio };
    if (photo) upd.photoURL = photo;
    await db.collection('users').doc(currentUser.uid).set(upd, { merge: true });
    if (name) await currentUser.updateProfile({ displayName: name }).catch(()=>{});
    _userData = { ..._userData, ...upd };
    delete window._pendingPhoto;
    document.getElementById('userName').textContent = name || 'Utilisateur';
    const av = document.getElementById('userAvatar');
    if (photo) av.innerHTML = `<img src="${esc(photo)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    else av.textContent = (name||'U').charAt(0).toUpperCase();
    showToast('Profil sauvegardé !', 'success');
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

      <input type="password" class="settings-input" id="newPwd" placeholder="Min. 6 caractères">
      <input type="password" class="settings-input" id="confPwd" placeholder="Confirmer" style="margin-top:8px;">
      <button class="btn-outline" style="margin-top:8px;" onclick="changePassword()">Changer le mot de passe</button>
    </div>
    <div class="settings-field">
      <label class="settings-label">Exporter mes données</label>
      <p class="settings-description">Télécharge toutes vos conversations en JSON.</p>
      <button class="btn-outline" onclick="downloadData()">Télécharger les données</button>
    </div>
    <div class="settings-field" style="border-top:1px solid var(--border);padding-top:18px;">
      <label class="settings-label" style="color:var(--red);">Zone dangereuse</label>
      <p class="settings-description">Cette action est définitive et irréversible.</p>
      <button class="btn-danger" onclick="deleteAccount()">Supprimer définitivement le compte</button>
    </div>
  </div>`;
}

async function changeEmail() {
  const e = document.getElementById('newEmail').value.trim();
  if (!e) { showToast('Email requis', 'error'); return; }
  try { await currentUser.updateEmail(e); showToast('Email mis à jour !', 'success'); }
  catch(err) {
    if (err.code === 'auth/requires-recent-login') showToast('Reconnectez-vous d\'abord', 'warning');
    else showToast('Erreur : ' + err.message, 'error');
  }
}

async function changePassword() {
  const p = document.getElementById('newPwd').value;
  const c = document.getElementById('confPwd').value;
  if (!p || p.length < 6) { showToast('Min. 6 caractères', 'error'); return; }
  if (p !== c) { showToast('Les mots de passe ne correspondent pas', 'error'); return; }
  try { await currentUser.updatePassword(p); showToast('Mot de passe modifié !', 'success'); document.getElementById('newPwd').value=''; document.getElementById('confPwd').value=''; }
  catch(err) {
    if (err.code === 'auth/requires-recent-login') showToast('Reconnectez-vous d\'abord', 'warning');
    else showToast('Erreur : ' + err.message, 'error');
  }
}

async function downloadData() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('conversations').get();
    const out = [];
    for (const d of snap.docs) {
      const ms = await db.collection('users').doc(currentUser.uid)
        .collection('conversations').doc(d.id).collection('messages').orderBy('timestamp','asc').get();
      out.push({ id: d.id, ...d.data(), messages: ms.docs.map(m => m.data()) });
    }
    const blob = new Blob([JSON.stringify(out, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), { href: url, download: `eva-data-${Date.now()}.json` });
    a.click(); URL.revokeObjectURL(url);
    showToast('Données téléchargées', 'success');
  } catch(e) { showToast('Erreur export : ' + e.message, 'error'); }
}

async function deleteAccount() {
  if (!confirm('Supprimer définitivement votre compte et toutes vos données ?')) return;
  if (!confirm('Dernière chance — action IRRÉVERSIBLE. Continuer ?')) return;
  try {
    const cs = await db.collection('users').doc(currentUser.uid).collection('conversations').get();
    const batch = db.batch();
    cs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    await db.collection('users').doc(currentUser.uid).delete();
    await currentUser.delete();
    window.location.href = '/';
  } catch(err) {
    if (err.code === 'auth/requires-recent-login') showToast('Reconnectez-vous d\'abord', 'warning');
    else showToast('Erreur : ' + err.message, 'error');
  }
}

  const rate   = localStorage.getItem('eva_speech_rate') || '1';

  c.innerHTML = `
  <div class="settings-section">
    <h3 class="settings-section-title">Voix & Synthèse vocale</h3>
    <div class="settings-field">
      <label class="settings-label">Voix Eva activée</label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
        <input type="checkbox" id="ttsCheck" ${ttsEnabled?'checked':''} style="width:18px;height:18px;accent-color:var(--cyan);">
        <span>Eva parle ses réponses automatiquement</span>
      </label>
    </div>
    <div class="settings-field">
      <label class="settings-label">Voix française</label>
      <select class="settings-select" id="voiceSel">
        <option value="">Meilleure voix disponible (recommandé)</option>
        ${voices.map(v => `<option value="${escAttr(v.name)}" ${selectedVoice&&selectedVoice.name===v.name?'selected':''}>${esc(v.name)} (${v.lang})</option>`).join('')}
      </select>
      <p class="settings-description">Edge : voix Microsoft Natural (très naturelles). Chrome : voix Google. Safari/Firefox : voix système.</p>
      ${!voices.length ? '<p class="settings-description" style="color:var(--orange);">Aucune voix française détectée sur ce navigateur.</p>' : ''}
    </div>
    <div class="settings-field">
      <label class="settings-label">Vitesse : <span id="rateVal">${rate}</span>x</label>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="${rate}"
             oninput="document.getElementById('rateVal').textContent=this.value"
             style="width:100%;accent-color:var(--cyan);margin-top:6px;">
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;">
      <button class="btn-outline" onclick="testVoice()">Tester la voix</button>
      <button class="btn-primary" onclick="saveVoice()">Sauvegarder</button>
    </div>
  </div>`;
}

function testVoice() {
  const vName = document.getElementById('voiceSel')?.value;
  const rate  = document.getElementById('rateSlider')?.value || 1;
  const tmpV  = vName ? speechSynthesis.getVoices().find(v => v.name === vName) : selectedVoice;
  stopSpeaking();
  const utt = new SpeechSynthesisUtterance("Bonjour ! Je suis Eva, votre assistante virtuelle. Je suis ravie de vous parler !");
  if (tmpV) utt.voice = tmpV;
  utt.lang = 'fr-FR'; utt.rate = parseFloat(rate);
  speechSynthesis.speak(utt);
}

function saveVoice() {
  ttsEnabled = document.getElementById('ttsCheck').checked;
  const vName = document.getElementById('voiceSel').value;
  const rate  = document.getElementById('rateSlider').value;
  localStorage.setItem('eva_tts', String(ttsEnabled));
  localStorage.setItem('eva_speech_rate', rate);
  if (vName) { selectedVoice = speechSynthesis.getVoices().find(v => v.name === vName) || selectedVoice; localStorage.setItem('eva_voice_name', vName); }
  else { selectedVoice = selectBestVoice(speechSynthesis.getVoices()); localStorage.removeItem('eva_voice_name'); }
  updateTTSBtn();
  showToast('Paramètres voix sauvegardés', 'success');
}

  const r = await callAI('Test de connexion. Réponds juste "Connexion réussie !" en une phrase courte.');
  aiProvider = savedP; aiCfg = savedC; context = savedCtx;
  if (r.success) { el.style.color = 'var(--green)'; el.textContent = r.content; }
  else           { el.style.color = 'var(--red)';   el.textContent = 'Erreur : ' + r.error; }

async function activateDev() {
  const key = document.getElementById('devKeyIn').value.trim();
  const el  = document.getElementById('devRes');
  if (!key) { showToast('Saisissez une clé', 'error'); return; }
  el.style.color = 'var(--text-muted)'; el.textContent = 'Vérification…';
  try {
    const snap = await db.collection('dev_keys_valid').where('key','==',key).where('active','==',true).get();
    if (snap.empty) { el.style.color = 'var(--red)'; el.textContent = 'Clé invalide ou inactive.'; return; }
    const role = snap.docs[0].data().role || 'developer';
    await db.collection('users').doc(currentUser.uid).set({ role, devKey: key }, { merge: true });
    _userData = { ..._userData, role, devKey: key };
    updateBadge(role);
    const labels = { creator:'Créateur — PDG Astral', creator_wife:'Épouse du Créateur', developer:'Développeur Astral' };
    el.style.color = 'var(--green)'; el.textContent = `Clé activée ! Rôle : ${labels[role]||role}`;
    showToast(`Rôle activé : ${labels[role]||role}`, 'success');
    setTimeout(() => renderDev(document.getElementById('settingsContent')), 1200);
  } catch(e) { el.style.color = 'var(--red)'; el.textContent = 'Erreur : ' + e.message; }
}

function updateBadge(role) {
  const map = { creator:{ t:'Créateur', c:'--orange' }, creator_wife:{ t:'Épouse', c:'--purple' }, developer:{ t:'Dev', c:'--green' }, user:{ t:'Utilisateur', c:'--cyan' } };
  const b = map[role] || map.user;
  const el = document.getElementById('userBadge');
  if (el) el.innerHTML = `<span style="color:var(${b.c})">${b.t}</span>`;
}

async function loadProfile() {
  try {
    const doc  = await db.collection('users').doc(currentUser.uid).get();
    const data = doc.exists ? doc.data() : {};
    data.displayName = data.displayName || currentUser.displayName || 'Utilisateur';
    data.photoURL    = data.photoURL    || currentUser.photoURL    || null;
    _userData = data;

    document.getElementById('userName').textContent = data.displayName;
    const av = document.getElementById('userAvatar');
    if (data.photoURL) av.innerHTML = `<img src="${esc(data.photoURL)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    else av.textContent = data.displayName.charAt(0).toUpperCase();

    if (data.role) updateBadge(data.role);
    if (data.preferences?.aiProvider) aiProvider = data.preferences.aiProvider;
  } catch(e) { console.warn('loadProfile', e); }
}

async function signOut() {
  if (!confirm('Se déconnecter ?')) return;
  stopSpeaking();
  await auth.signOut();
  window.location.href = '/login.html';
}

async function submitReport() {
  const type = document.querySelector('.report-type-btn.active')?.dataset.type || 'bug';
  const title = document.getElementById('reportTitle').value.trim();
  const msg   = document.getElementById('reportMessage').value.trim();
  if (!title || !msg) { showToast('Remplissez tous les champs', 'error'); return; }
  try {
    await db.collection('reports').add({ userId: currentUser.uid, userEmail: currentUser.email, type, title, message: msg, createdAt: timestamp() });
    showToast('Rapport envoyé. Merci !', 'success');
    document.getElementById('reportModal').classList.remove('active');
    document.getElementById('reportTitle').value = '';
    document.getElementById('reportMessage').value = '';
  } catch(e) { showToast('Erreur : ' + e.message, 'error'); }
}

function setupListeners() {
  // Sidebar
  document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
  document.getElementById('newConvBtn').addEventListener('click', newConv);

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => searchConvs(e.target.value.trim()), 300);
  });

  // Send
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('messageInput').addEventListener('input', (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px';
  });

  // Voice
  document.getElementById('voiceBtn').addEventListener('click', toggleSTT);
  document.getElementById('ttsToggleBtn').addEventListener('click', () => {
    if (isSpeaking) { stopSpeaking(); return; }
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('eva_tts', String(ttsEnabled));
    updateTTSBtn();
    showToast(ttsEnabled ? 'Voix Eva activée' : 'Voix Eva désactivée', 'info');
  });

  // Tone
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTone = btn.dataset.tone;
    });
  });

  // Settings
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
  document.querySelectorAll('.settings-nav-item').forEach(el => {
    el.addEventListener('click', () => showSection(el.dataset.section));
  });

  // User dropdown
  document.getElementById('userProfile').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('userProfile').classList.toggle('open');
  });
  document.addEventListener('click', () => {
    document.getElementById('userProfile').classList.remove('open');
  });

  // Sign out
  document.getElementById('signOutBtn').addEventListener('click', signOut);

  // Report
  document.getElementById('reportBtn').addEventListener('click', () => document.getElementById('reportModal').classList.add('active'));
  document.getElementById('closeReportBtn').addEventListener('click', () => document.getElementById('reportModal').classList.remove('active'));
  document.getElementById('submitReportBtn').addEventListener('click', submitReport);
  document.querySelectorAll('.report-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.report-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Nav items (tools — coming soon)
  document.querySelectorAll('.nav-item[data-view]').forEach(item => {
    item.addEventListener('click', () => {
      const v = item.dataset.view;
      if (v === 'chat') return;
      const labels = { voice:'Voix', imagine:'Imagine', calendar:'Agenda', reminders:'Rappels', alarms:'Alarmes', notes:'Notes' };
      showToast(`${labels[v]||v} — Bientôt disponible`, 'info');
    });
  });

  // ESC closes modals
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeSettings(); document.getElementById('reportModal').classList.remove('active'); }
  });

  // Modal overlay clicks
  document.querySelectorAll('.modal-overlay').forEach(ov => {
    ov.addEventListener('click', (e) => { if (e.target === ov) ov.classList.remove('active'); });
  });

  // Attach btn (placeholder)
  document.getElementById('attachBtn').addEventListener('click', () => showToast('Pièces jointes — Bientôt disponible', 'info'));
}

auth.onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = '/login.html';
  } else {
    currentUser = user;
    initApp();
  }
});

async function initApp() {
  loadAIConfig();
  initTTS();
  initSTT();
  await loadProfile();
  await loadConvList();
  setupListeners();
  setTimeout(() => document.getElementById('messageInput')?.focus(), 400);
}
